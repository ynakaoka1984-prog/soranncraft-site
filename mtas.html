function initGlossary() {
  const grid = document.getElementById('glossaryGrid');
  grid.innerHTML = terms.map(term => `
    <div class="term-card">
      <div class="term-header">
        <h3 class="term-title">${term.t}</h3>
        <span class="term-cat">${term.c}</span>
      </div>
      <p class="term-desc">${term.d}</p>
    </div>
  `).join('');
  updateStats(terms.length);
}

function filterTerms() {
  const query = document.getElementById('glossarySearch').value.toLowerCase();
  const cards = document.getElementsByClassName('term-card');
  let count = 0;

  for (let card of cards) {
    const title = card.querySelector('.term-title').innerText.toLowerCase();
    const desc = card.querySelector('.term-desc').innerText.toLowerCase();
    const cat = card.querySelector('.term-cat').innerText.toLowerCase();

    if (title.includes(query) || desc.includes(query) || cat.includes(query)) {
      card.style.display = 'flex';
      count++;
    } else {
      card.style.display = 'none';
    }
  }
  updateStats(count);
}

function updateStats(count) {
  document.getElementById('termStats').innerText = `該当: ${count} 件`;
}

window.onload = initGlossary;
